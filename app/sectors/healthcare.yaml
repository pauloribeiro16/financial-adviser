sector: Healthcare
indicators:
  - id: rd_pct_revenue
    name: "R&D / Revenue"
    extract: "fundamentals.rd_pct_revenue"
    healthier_is: mid
    healthy_threshold: 0.15
    warning_threshold: 0.07
    unit: "pct"

  - id: fcf_margin
    name: "FCF Margin"
    extract: "fundamentals.fcf_margin"
    healthier_is: higher
    healthy_threshold: 0.20
    warning_threshold: 0.10
    unit: "pct"

  - id: gross_margin
    name: "Gross Margin"
    extract: "fundamentals.gross_margin"
    healthier_is: higher
    healthy_threshold: 0.65
    warning_threshold: 0.45
    unit: "pct"

  - id: patent_cliff_years
    name: "Patent Cliff Horizon (years)"
    extract: "fundamentals.patent_cliff_years"
    healthier_is: higher
    healthy_threshold: 8.0
    warning_threshold: 4.0
    unit: "years"

  - id: debt_to_ebitda
    name: "Debt / EBITDA"
    extract: "fundamentals.debt_to_ebitda"
    healthier_is: lower
    healthy_threshold: 2.0
    warning_threshold: 3.5
    unit: "x"

  - id: dividend_yield
    name: "Dividend Yield"
    extract: "fundamentals.dividend_yield"
    healthier_is: mid
    healthy_threshold: 0.025
    warning_threshold: 0.01
    unit: "pct"

  - id: revenue_growth_yoy
    name: "Revenue Growth YoY %"
    extract: "fundamentals.revenue_growth_yoy"
    healthier_is: higher
    healthy_threshold: 0.06
    warning_threshold: 0.02
    unit: "pct"