name: version-outputs

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-out:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "outputs-bot"
          git config user.email "outputs-bot@users.noreply.github.com"

      - name: Stage out/ changes
        run: |
          git add -A out/ || true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit out/
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git commit -m "out: snapshot ${ts}" \
            -m "Automated commit by the version-outputs workflow." \
            -m "Tracks debate results, per-agent snapshots, summaries, meta, and 10-K summaries under out/." \
            -m "Raw 10-K HTMLs and binary intermediates remain excluded via .gitignore."

      - name: Push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: git push